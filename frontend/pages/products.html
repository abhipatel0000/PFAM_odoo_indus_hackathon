<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | CoreInventory</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        /* Reusing dashboard layout */
        .dashboard-layout { display: grid; grid-template-columns: 250px 1fr; min-height: 100vh; }
        .sidebar { background: var(--bg-dark); border-right: 1px solid var(--glass-border); padding: 2rem; }
        .main-content { padding: 2.5rem; }
        nav ul { list-style: none; margin-top: 2rem; }
        nav ul li { margin-bottom: 1rem; }
        nav ul li a { color: var(--text-light); text-decoration: none; display: block; padding: 0.75rem 1rem; border-radius: 8px; }
        nav ul li a:hover, nav ul li a.active { background: var(--glass-bg); color: var(--primary-color); }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .product-card { padding: 1.5rem; position: relative; }
        .product-card .sku { font-size: 0.75rem; color: var(--text-muted); }
        .product-card .stock { font-weight: 700; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <h2 style="color: var(--primary-color);">CoreInv</h2>
            <nav>
                <ul>
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="products.html" class="active">Products</a></li>
                    <li><a href="receipts.html">Receipts</a></li>
                    <li><a href="deliveries.html">Deliveries</a></li>
                    <li><a href="transfers.html">Transfers</a></li>
                    <li><a href="#" id="logoutBtn" style="color: var(--accent-color);">Logout</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; height: auto; background: none;">
                <h3>Product Catalog</h3>
                <button class="btn btn-primary">+ Add Product</button>
            </header>

            <div class="product-grid" id="productGrid">
                <!-- Products will be loaded here -->
            </div>
        </main>
    </div>
    <script src="../js/auth.js"></script>
    <script src="../js/products.js"></script>
</body>
</html>
