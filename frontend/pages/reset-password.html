<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MediSync | Reset Password</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="../css/core-theme.css" rel="stylesheet">
    <script src="../js/tailwind-config.js"></script>
</head>
<body class="min-h-screen bg-background text-on-surface flex items-center justify-center p-6 animate-fade-in">

    <!-- Background Glows -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute -top-40 right-1/4 w-96 h-96 bg-secondary rounded-full blur-[150px] opacity-10"></div>
        <div class="absolute -bottom-40 left-1/4 w-96 h-96 bg-primary rounded-full blur-[150px] opacity-10"></div>
    </div>

    <div class="relative w-full max-w-md">
        <!-- Logo -->
        <div class="flex items-center justify-center gap-3 mb-10">
            <div class="w-14 h-14 primary-gradient rounded-2xl flex items-center justify-center shadow-glow">
                <span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings: 'FILL' 1;">dataset</span>
            </div>
            <div>
                <h1 class="font-headline font-extrabold text-2xl text-white tracking-tight">MediSync</h1>
                <p class="text-[10px] text-primary-container tracking-[0.2em] font-bold uppercase">Pharmacy System</p>
            </div>
        </div>

        <!-- Reset Password Card -->
        <div class="glass-panel rounded-3xl p-8 shadow-2xl border border-outline-variant">
            <div class="w-16 h-16 mx-auto mb-6 rounded-2xl bg-secondary/10 border border-secondary/30 flex items-center justify-center">
                <span class="material-symbols-outlined text-secondary text-3xl">key</span>
            </div>
            <h2 class="text-2xl font-headline font-bold text-white text-center mb-2">Reset Password</h2>
            <p class="text-on-surface-variant text-sm text-center mb-8">Create a strong new password for your account</p>

            <form id="resetForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-on-surface-variant uppercase tracking-widest pl-1">New Password</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors text-xl">lock</span>
                        <input id="reset-password" class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl py-3.5 pl-12 pr-4 text-white text-[15px] focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-on-surface-variant/50" placeholder="Min 6 characters" type="password" required autocomplete="new-password"/>
                    </div>
                    <!-- Strength indicator -->
                    <div class="flex gap-1 px-1">
                        <div id="str-1" class="h-1 flex-1 rounded-full bg-outline-variant transition-colors"></div>
                        <div id="str-2" class="h-1 flex-1 rounded-full bg-outline-variant transition-colors"></div>
                        <div id="str-3" class="h-1 flex-1 rounded-full bg-outline-variant transition-colors"></div>
                        <div id="str-4" class="h-1 flex-1 rounded-full bg-outline-variant transition-colors"></div>
                    </div>
                    <p id="str-label" class="text-[11px] text-on-surface-variant pl-1"></p>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-on-surface-variant uppercase tracking-widest pl-1">Confirm Password</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors text-xl">lock</span>
                        <input id="reset-confirm" class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl py-3.5 pl-12 pr-4 text-white text-[15px] focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-on-surface-variant/50" placeholder="Re-enter new password" type="password" required autocomplete="new-password"/>
                    </div>
                </div>

                <div id="reset-error" class="hidden text-sm text-tertiary bg-tertiary/10 border border-tertiary/30 px-4 py-3 rounded-xl"></div>
                <div id="reset-success" class="hidden text-sm text-secondary bg-secondary/10 border border-secondary/30 px-4 py-3 rounded-xl"></div>

                <button type="submit" id="reset-btn" class="w-full btn-primary-gradient text-white py-3.5 rounded-xl font-bold text-[15px] hover-lift flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-xl">check_circle</span> Update Password
                </button>
            </form>
        </div>

        <p class="text-center text-on-surface-variant/50 text-xs mt-8">&copy; 2026 MediSync Pharmacy System</p>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
