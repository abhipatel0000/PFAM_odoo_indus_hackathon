<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MediSync | Sign Up</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="../css/core-theme.css" rel="stylesheet">
    <script src="../js/tailwind-config.js"></script>
</head>
<body class="min-h-screen bg-background text-on-surface flex items-center justify-center p-6 animate-fade-in">

    <!-- Background Glows -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute -top-40 -right-40 w-96 h-96 bg-secondary rounded-full blur-[150px] opacity-10"></div>
        <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-primary rounded-full blur-[150px] opacity-10"></div>
    </div>

    <div class="relative w-full max-w-md">
        <!-- Logo -->
        <div class="flex items-center justify-center gap-3 mb-10">
            <div class="w-14 h-14 primary-gradient rounded-2xl flex items-center justify-center shadow-glow">
                <span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings: 'FILL' 1;">dataset</span>
            </div>
            <div>
                <h1 class="font-headline font-extrabold text-2xl text-white tracking-tight">MediSync</h1>
                <p class="text-[10px] text-primary-container tracking-[0.2em] font-bold uppercase">Pharmacy System</p>
            </div>
        </div>

        <!-- Signup Card -->
        <div class="glass-panel rounded-3xl p-8 shadow-2xl border border-outline-variant">
            <h2 class="text-2xl font-headline font-bold text-white text-center mb-2">Create Account</h2>
            <p class="text-on-surface-variant text-sm text-center mb-8">Join MediSync pharmacy platform</p>

            <form id="signupForm" class="space-y-5">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-on-surface-variant uppercase tracking-widest pl-1">Full Name</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors text-xl">badge</span>
                        <input id="signup-name" class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl py-3.5 pl-12 pr-4 text-white text-[15px] focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-on-surface-variant/50" placeholder="Enter full name" type="text" required/>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-widest pl-1">Username</label>
                        <input id="signup-username" class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl py-3.5 px-4 text-white text-[15px] focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-on-surface-variant/50" placeholder="Username" type="text" required autocomplete="username"/>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-widest pl-1">Phone</label>
                        <input id="signup-phone" class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl py-3.5 px-4 text-white text-[15px] focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-on-surface-variant/50" placeholder="+91..." type="tel"/>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-on-surface-variant uppercase tracking-widest pl-1">Email Address</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors text-xl">mail</span>
                        <input id="signup-email" class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl py-3.5 pl-12 pr-4 text-white text-[15px] focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-on-surface-variant/50" placeholder="you@example.com" type="email" required autocomplete="email"/>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-widest pl-1">Password</label>
                        <input id="signup-password" class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl py-3.5 px-4 text-white text-[15px] focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-on-surface-variant/50" placeholder="Min 6 chars" type="password" required autocomplete="new-password"/>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-widest pl-1">Confirm</label>
                        <input id="signup-confirm" class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl py-3.5 px-4 text-white text-[15px] focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-on-surface-variant/50" placeholder="Re-type" type="password" required autocomplete="new-password"/>
                    </div>
                </div>

                <div id="signup-error" class="hidden text-sm text-tertiary bg-tertiary/10 border border-tertiary/30 px-4 py-3 rounded-xl"></div>

                <button type="submit" id="signup-btn" class="w-full btn-primary-gradient text-white py-3.5 rounded-xl font-bold text-[15px] hover-lift flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-xl">person_add</span> Create Account
                </button>
            </form>

            <p class="text-center text-on-surface-variant text-sm mt-6">
                Already have an account? <a href="login.html" class="text-primary font-bold hover:underline">Sign In</a>
            </p>
        </div>

        <p class="text-center text-on-surface-variant/50 text-xs mt-8">&copy; 2026 MediSync Pharmacy System</p>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
